kind = "web"
previewPath = "/"
title = "Lex Aureum"
version = "1.0.0"
id = "artifacts/lex-aureum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18150

[services.development]
run = "pnpm --filter @workspace/lex-aureum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lex-aureum", "run", "build" ]
publicDir = "artifacts/lex-aureum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18150"
BASE_PATH = "/"
